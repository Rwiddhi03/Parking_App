<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parking Lot System</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      height: 100vh;
      background-color: #2f2f2f; /* Dark gray */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background-color: #4b4b4b; /* Medium gray */
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      color: #ff4c4c; /* Red text */
    }

    h1, p {
      color: #ff4c4c;
    }

    .btn-login {
      background-color: #6c757d;
      border: none;
      color: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .btn-login:hover {
      background-color: #23272b;
    }

    .btn-signup {
      background-color: #6c757d;
      border: none;
      color: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .btn-signup:hover {
      background-color: #23272b;
    }

    .btn-custom {
      width: 100px;
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <div class="card mx-auto" style="max-width: 400px;">
      <h1 class="mb-3">ParkPrime</h1>
      <p class="mb-4">Please <strong>Login</strong> or <strong>Signup</strong> to access all features of ParkPrime.</p>
      <div class="d-flex justify-content-center gap-3">
        <a href="/login" class="btn btn-login btn-custom">Login</a>
        <a href="/signup" class="btn btn-signup btn-custom">Signup</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
