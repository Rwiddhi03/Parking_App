<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Parking Spot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-box {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      border: 2px solid #6c757d;
      border-radius: 10px;
      background-color: #ffffff;
    }
  </style>
</head>
<body class="container">

  <div class="form-box">
    <h4 class="text-center mb-3">Book a Parking Spot</h4>
    
    {% if message %}
      <div class="alert alert-info mt-3">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('book_spot', lot_id=lot_id) }}">
      <div class="mb-3">
        <label class="form-label">Lot ID:</label>
        <input type="text" class="form-control" name="lot_id" value="{{ lot_id }}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Spot ID:</label>
        <input type="text" class="form-control" name="spot_id" value="{{ spot_id }}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">User ID:</label>
        <input type="text" class="form-control" name="user_id" value="{{ user_id }}" readonly>
      </div>

      <div class="mb-3">
        <label for="vehicle_number" class="form-label">Vehicle Number: <i>Enter vehicle number here</i></label>
        <input type="text" name="vehicle_no" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-warning w-100">Reserve Spot</button>
    </form>

  </div>

</body>
</html>
